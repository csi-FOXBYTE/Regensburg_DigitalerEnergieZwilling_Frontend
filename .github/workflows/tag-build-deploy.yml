name: Tag Build and Deploy

on:
  push:
    tags:
      - "*"

permissions:
  contents: read
  packages: write

concurrency:
  group: tag-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release channel from tag
        id: channel
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"

          if [[ "${TAG}" == *"-dev."* ]]; then
            echo "name=dev" >> "${GITHUB_OUTPUT}"
          else
            echo "name=prod" >> "${GITHUB_OUTPUT}"
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "name=${IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image (dev)
        if: steps.channel.outputs.name == 'dev'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.channel.outputs.tag }}
            ${{ steps.image.outputs.name }}:dev

      - name: Build and push image (prod)
        if: steps.channel.outputs.name == 'prod'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.channel.outputs.tag }}
            ${{ steps.image.outputs.name }}:latest

      - name: SSH deploy (dev)
        if: steps.channel.outputs.name == 'dev'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            IMAGE="${{ steps.image.outputs.name }}:${{ steps.channel.outputs.tag }}"
            NAMESPACE="cc-loc-access-stack"
            DEPLOYMENT="digital-energy-twin-public"
            CONTAINER="public"

            kubectl -n "${NAMESPACE}" set image deployment/"${DEPLOYMENT}" \
              "${CONTAINER}"="${IMAGE}"
            kubectl -n "${NAMESPACE}" rollout status deployment/"${DEPLOYMENT}"

      - name: SSH deploy (prod)
        if: steps.channel.outputs.name == 'prod'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -euo pipefail
            IMAGE="${{ steps.image.outputs.name }}:${{ steps.channel.outputs.tag }}"
            NAMESPACE="cc-loc-access-stack"
            DEPLOYMENT="digital-energy-twin-public"
            CONTAINER="public"

            kubectl -n "${NAMESPACE}" set image deployment/"${DEPLOYMENT}" \
              "${CONTAINER}"="${IMAGE}"
            kubectl -n "${NAMESPACE}" rollout status deployment/"${DEPLOYMENT}"
