server {
    listen 8080;
    listen [::]:8080;
    server_name localhost;

    # Das Verzeichnis, in das wir unsere Astro-Build-Dateien kopieren
    root /usr/share/nginx/html;
    index index.html;

    # 1. Sprachbasierte Weiterleitung auf Root-Ebene
    # Leitet Nutzer mit deutscher Sprachpräferenz zu /de weiter, alle anderen zu /en.
    absolute_redirect off;

    location = / {
        set $lang "en";
        if ($http_accept_language ~* "^de") {
            set $lang "de";
        }
        return 302 /$lang;
    }

    # Standard-Routing:
    # Versuche die angefragte Datei ($uri) zu finden.
    # Wenn es ein Ordner ist ($uri/), suche darin nach einer index.html (Astro Standard).
    # Wenn beides fehlschlägt, zeige einen 404-Fehler.
    location / {
        try_files $uri $uri/index.html =404;
    }

    # 2. Astro 404-Seite einbinden
    # Astro generiert standardmäßig eine 404.html, wenn du eine src/pages/404.astro hast.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # 3. Aggressives Caching für statische Assets (Bilder, Schriften, CSS, JS)
    # Astro fügt seinen gebauten Assets (im /_astro Ordner) Hashes hinzu. 
    # Daher können wir diese theoretisch für immer ("1y" = 1 Jahr) im Browser cachen.
    location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|webp|woff2|woff|ttf)$ {
        expires 1y;
        access_log off; # Spart Festplattenplatz und I/O im Container
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 4. HTML-Dateien NICHT cachen
    # Das ist wichtig! Wenn du ein Update veröffentlichst, sollen die Nutzer 
    # sofort die neue HTML-Datei (mit den neuen Verweisen auf CSS/JS) bekommen.
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}